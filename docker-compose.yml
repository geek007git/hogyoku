services:
  api:
    build: .
    command: >
      sh -c "node dist/src/db/migrate.js &&
             node dist/src/server.js"
    environment:
      NODE_ENV: production
      PORT: 4173
      APP_ORIGIN: http://localhost:4173
      DATABASE_URL: postgres://hogyoku:hogyoku@postgres:5432/hogyoku
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: hogyoku
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: miniosecret
      S3_FORCE_PATH_STYLE: "true"
      SESSION_SECRET: local-development-secret-change-before-production
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CHAT_MODEL: ${CHAT_MODEL:-gemini-2.5-flash-lite}
      VISION_MODEL: ${VISION_MODEL:-gemini-2.5-flash-lite}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-gemini-embedding-001}
      EMBEDDING_DIMENSIONS: 1536
      MAX_UPLOAD_MB: 40
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4173/api/health').then(r=>{if(!r.ok)process.exit(1)})"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "4173:4173"

  worker:
    build: .
    command: node dist/src/worker.js
    environment:
      NODE_ENV: production
      PORT: 4173
      APP_ORIGIN: http://localhost:4173
      DATABASE_URL: postgres://hogyoku:hogyoku@postgres:5432/hogyoku
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: hogyoku
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: miniosecret
      S3_FORCE_PATH_STYLE: "true"
      SESSION_SECRET: local-development-secret-change-before-production
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CHAT_MODEL: ${CHAT_MODEL:-gemini-2.5-flash-lite}
      VISION_MODEL: ${VISION_MODEL:-gemini-2.5-flash-lite}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-gemini-embedding-001}
      EMBEDDING_DIMENSIONS: 1536
      MAX_UPLOAD_MB: 40
      LOG_LEVEL: info
      WORKER_CONCURRENCY: 2
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: hogyoku
      POSTGRES_USER: hogyoku
      POSTGRES_PASSWORD: hogyoku
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hogyoku"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minio miniosecret; do sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/hogyoku;
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
